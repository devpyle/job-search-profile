<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Job Search{% endblock %} — Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>
  <nav class="topnav">
    <div class="nav-brand">Job <span>Search</span></div>
    <div class="nav-links">
      <a href="{{ url_for('board') }}"  class="{% if request.endpoint == 'board'  %}active{% endif %}">Board</a>
      <a href="{{ url_for('radar') }}"  class="{% if request.endpoint == 'radar'  %}active{% endif %}">Radar</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
